os: linux
dist: trusty
language: c

git:
  depth: 3

jobs:
  include:
    - name: "GCC 4.4"
      compiler: gcc-4.4
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - gcc-4.4
    - name: "GCC 4.6"
      compiler: gcc-4.6
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - gcc-4.6
    - name: "GCC 4.7"
      compiler: gcc-4.7
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - gcc-4.7
    - name: "GCC 4.8"
      compiler: gcc-4.8
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - gcc-4.8
    - name: "GCC 4.9"
      compiler: gcc-4.9
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - gcc-4.9
    - name: "GCC 5"
      compiler: gcc-5
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - gcc-5
    - name: "GCC 6"
      compiler: gcc-6
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - gcc-6
    - name: "Clang 3.4"
      compiler: clang
      addons:
        apt:
          packages:
            - clang-3.4
    - name: "Clang 3.5"
      compiler: clang-3.5
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
            - llvm-toolchain-precise-3.5
          packages:
            - clang-3.5
    - name: "Clang 3.6"
      compiler: clang-3.6
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
            - llvm-toolchain-precise-3.6
          packages:
            - clang-3.6
    - name: "Clang 3.7"
      compiler: clang-3.7
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
            - llvm-toolchain-precise-3.7
          packages:
            - clang-3.7
    - name: "GCC on FreeBSD"
      os: freebsd
      compiler: gcc
      env:
        - CONFIGURE_OPTS='--with-compress-command=/usr/bin/gzip --with-uncompress-command=/usr/bin/gunzip --with-default-mail-command=/usr/bin/mail'
    - name: "Clang on FreeBSD"
      os: freebsd
      compiler: clang
      env:
        # libpopt gets installed into /usr/local and Clang does not search there by default
        - CFLAGS='-I /usr/local/include'
        - CONFIGURE_OPTS='--with-compress-command=/usr/bin/gzip --with-uncompress-command=/usr/bin/gunzip --with-default-mail-command=/usr/bin/mail'
        - LDFLAGS='-L /usr/local/lib'

install:
  - |
    if [[ "${TRAVIS_OS_NAME}" = "linux" ]]; then
      sudo apt-get -qq update
      sudo apt-get -qq install libpopt-dev libselinux1-dev libacl1-dev automake rpm acl
    fi
  - |
    if [[ "${TRAVIS_OS_NAME}" = "freebsd" ]]; then
      sudo pkg install --yes gzip popt
    fi

script:
  - $CC --version
  - ./autogen.sh
  - ./configure --enable-werror --disable-silent-rules $CONFIGURE_OPTS
  - make
  - make -j9 check || ( cat test/test-suite.log; exit 1; )
  - sudo make install
  - make -j9 distcheck DISTCHECK_CONFIGURE_FLAGS="--enable-werror --disable-silent-rules $CONFIGURE_OPTS"
  # nodeps because rpm build deps cannot be installed on debian system
  - |
    if [[ "${TRAVIS_OS_NAME}" = "linux" ]]; then
      make rpm RPM_FLAGS="--nodeps"
    fi

notifications:
  email:
    recipients:
      - logrotate-owner@fedoraproject.org
    on_success: always
    on_failure: always

